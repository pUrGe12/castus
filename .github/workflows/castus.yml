name: firmware-ci
on: [push, pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: deps
        run: |
          pip install pyyaml
          sudo apt-get update -qq && sudo apt-get install -y -qq cppcheck

      - name: Static analysis (cppcheck)
        run: cppcheck --quiet firmware/main_functions.cc      # green: the bug is valid code

      - name: Host unit tests
        run: mkdir -p build && make test-host                 # green

      - name: castus SIL gate
        run: |
          S=$(bash scripts/which-scenario.sh)
          echo "::notice title=castus::firmware resolves to scenario '$S'"
          make scene NAME=$S
          ./castus --verify .                                 # <-- red when S != clean
