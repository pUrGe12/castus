name: firmware-ci
on: [pull_request]

jobs:
  verify:
    runs-on: ubuntu-latest
    container: espressif/idf:release-v5.5     # esp-idf + xtensa toolchain (addr2line) + qemu
    steps:
      - uses: actions/checkout@v4

      - name: Static analysis (esp-clang)
        run: idf.py clang-check || true        # noisy warnings — none of them the real bug

      - name: Host unit tests
        run: make test-host                    # green

      # In a real repo this is `idf.py build` of the PR's firmware. For a
      # deterministic demo we stage a captured scenario (replay). Use --live to
      # boot qemu for real.
      - name: Build firmware image
        run: make scene NAME=arena

      - name: castus SIL gate                  # <-- this is what goes red and blocks the PR
        run: ./castus --verify .
