# castus — per-project verification config.
# Identical across all three scenarios: the firmware (in build/) decides what
# gets caught. `make scene NAME=arena` (or, on the real box, `git checkout
# bug/arena && idf.py build`) populates build/ with that scenario's artifacts.

project: hello_world          # esp-tflite-micro sine model (TFLM)
board:   esp32                # -> qemu machine + xtensa-esp32-elf toolchain (see BOARDS in ./castus)

build:
  image: build/flash.bin             # merged qemu image (idf.py build + esptool merge_bin)
  elf:   build/hello_world.elf       # symbols, for backtrace decoding

boot:
  replay:  build/boot.log            # DEMO: replay a real capture. Pass --live to boot qemu.
  timeout: 60                        # seconds (live mode only)

checks:
  - boot                             # fail on panic; decode the backtrace automatically
  - inference:                       # fail when outputs drift from the trusted reference
      golden: golden/sine.log        # the known-good run, captured once
      tol:    0.05
